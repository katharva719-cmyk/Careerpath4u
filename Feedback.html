<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Feedback Form</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      margin: 0;
      padding: 0;
      background: linear-gradient(-45deg, #4b0082, #8a2be2, #da70d6, #ff1493);
      background-size: 400% 400%;
      animation: gradient-animation 15s ease infinite;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    @keyframes gradient-animation {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    nav { background-color: rgba(30,41,59,0.8); backdrop-filter: blur(10px); position: sticky; top: 0; z-index: 100; }
    nav ul { list-style: none; margin: 0; padding: 0; display: flex; justify-content: center; }
    nav li a { color: white; padding: 1rem 1.5rem; text-decoration: none; font-weight: 600; display: block; }
    nav li a:hover { background-color: #334155; }
    nav li.active a { background-color: #4a5568; color: #ff1493; }
    .form-container { flex: 1; display: flex; justify-content: center; align-items: center; padding: 2rem 1rem; }
    .feedback-form { width: 100%; max-width: 600px; background-color: rgba(30,41,59,0.8); backdrop-filter: blur(10px); padding: 2.5rem; border-radius: 20px; }
    h2 { text-align: center; font-size: 2rem; font-weight: 700; margin-bottom: 2rem; color: #da70d6; }
    .form-group { margin-bottom: 1.5rem; }
    input, textarea, select { width: 100%; padding: 0.75rem; border-radius: 10px; border: 1px solid #da70d6; background: rgba(74,85,104,0.5); color: white; }
    .submit-btn { width: 100%; padding: 1rem; background: linear-gradient(45deg,#da70d6,#8a2be2,#4b0082); border: none; border-radius: 10px; color: white; font-size: 1.25rem; font-weight: 700; cursor: pointer; }
    .success-animation { display: none; text-align: center; font-size: 1.5rem; color: white; margin-top: 20px; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav>
    <ul>
      <li><a href="Home.html">Home</a></li>
      <li><a href="Qualification.html">Qualification</a></li>
      <li><a href="Interview prepration.html">Interview Prep</a></li>
      <li><a href="Facilities.html">Facilities</a></li>
      <li><a href="Contact us.html">Contact us</a></li>
      <li class="active"><a href="#">Feedback</a></li>
    </ul>
  </nav>

  <!-- Feedback Form -->
  <div class="form-container">
    <div class="feedback-form">
      <h2>Your Feedback Matters</h2>
      <form id="feedbackForm">
        <div class="form-group">
          <label for="name">Your Name</label>
          <input type="text" id="name" name="name" placeholder="Atharva Kulkarni" required>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="chetana123@gmail.com" required>
        </div>
        <div class="form-group">
          <label for="rating">Rating</label>
          <select id="rating" name="rating">
            <option value="5">Excellent</option>
            <option value="4">Good</option>
            <option value="3">Average</option>
            <option value="2">Poor</option>
            <option value="1">Terrible</option>
          </select>
        </div>
        <div class="form-group">
          <label for="comments">Comments</label>
          <textarea id="comments" name="comments" placeholder="Tell us what you think..."></textarea>
        </div>
        <button type="submit" class="submit-btn">Submit Feedback</button>
      </form>
      <div id="successAnimation" class="success-animation">✅ Feedback Submitted! Thank you.</div>
    </div>
  </div>

  <script>
  document.getElementById("feedbackForm").addEventListener("submit", async function(event) {
    event.preventDefault();

    const formData = {
      name: document.getElementById("name").value,
      email: document.getElementById("email").value,
      rating: document.getElementById("rating").value,
      comments: document.getElementById("comments").value
    };

    const response = await fetch("/submit-feedback", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(formData)
    });

    if (response.ok) {
      document.getElementById("feedbackForm").reset();
      document.getElementById("successAnimation").style.display = "block";

      setTimeout(() => {
        document.getElementById("successAnimation").style.display = "none";
      }, 3000);
    } else {
      alert("❌ Failed to submit feedback.");
    }
  });
</script>


</body>
</html>
